events {}

http {

  upstream nakama {
    server nakama:7350;
  }

  server {
    listen 80;
    listen [::]:80;

    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    ssl_certificate /etc/nginx/ssl/live/ttt.goodshepherdim.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/ttt.goodshepherdim.com/privkey.pem;

    # frontend redirect
    location / {
      return 301 https://your-vercel-frontend.vercel.app;
    }

    # Nakama API
    location /v2/ {
      proxy_pass http://nakama;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /socket {
      proxy_pass http://nakama;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }
}