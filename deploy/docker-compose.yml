services:
  cockroachdb:
    image: cockroachdb/cockroach:v24.1.0
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      cockroach start-single-node --insecure --listen-addr=0.0.0.0:26257 &
      until cockroach sql --insecure --host=localhost:26257 -e 'SELECT 1'; do
        sleep 2;
      done &&
      cockroach sql --insecure --host=localhost:26257 -e 'CREATE DATABASE IF NOT EXISTS nakama;' &&
      wait
      "
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    healthcheck:
      test:
        [
          "CMD",
          "cockroach",
          "sql",
          "--insecure",
          "--host=localhost:26257",
          "-e",
          "SELECT 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  backend-plugin:
    build:
      context: ../nakama
      dockerfile: Dockerfile
    image: tic-tac-toe-nakama-plugin:latest
    volumes:
      - plugin_output:/output
    entrypoint: ["/bin/sh", "-c", "cp /tic-tac-toe-nakama.so /output/ && tail -f /dev/null"]

  nakama-migrate:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      cockroachdb:
        condition: service_healthy
    entrypoint:
      - "/nakama/nakama"
    command:
      - "migrate"
      - "up"
      - "--database.address"
      - "root@cockroachdb:26257/nakama?sslmode=disable"

  nakama:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      cockroachdb:
        condition: service_healthy
      nakama-migrate:
        condition: service_completed_successfully
      backend-plugin:
        condition: service_started
    ports:
      - "7350:7350"
      - "7349:7349"
    volumes:
      - plugin_output:/nakama/data/modules
      - ../nakama/local.yml:/nakama/data/local.yml
    entrypoint:
      - "/nakama/nakama"
    command:
      - "--config"
      - "/nakama/data/local.yml"
    restart: unless-stopped

  frontend:
    image: node:22
    working_dir: /app
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: sh -c "corepack enable && pnpm install && pnpm dev --host"
    ports:
      - "5173:5173"
    depends_on:
      - nakama

volumes:
  cockroach_data:
  plugin_output: