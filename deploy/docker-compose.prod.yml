services:
  cockroachdb:
    image: cockroachdb/cockroach:v24.1.0
    command: start-single-node --insecure
    volumes:
      - cockroach_data:/cockroach/cockroach-data

  nakama:
    build:
      context: ../nakama
    depends_on:
      - cockroachdb
    restart: always

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - nakama

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: sh -c "corepack enable && pnpm install && pnpm build && pnpm preview --host"
    restart: always

volumes:
  cockroach_data: