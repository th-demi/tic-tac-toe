services:
  cockroachdb:
    image: cockroachdb/cockroach:v24.1.0
    command: start-single-node --insecure
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    healthcheck:
      test:
        [
          "CMD",
          "cockroach",
          "sql",
          "--insecure",
          "--host=localhost:26257",
          "-e",
          "SELECT 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend-plugin:
    build:
      context: ../nakama
      dockerfile: Dockerfile
    image: tic-tac-toe-nakama-plugin:latest
    volumes:
      - plugin_output:/output
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "cp /tic-tac-toe-nakama.so /output/ && tail -f /dev/null",
      ]

  nakama-migrate:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      cockroachdb:
        condition: service_healthy
    entrypoint: ["/nakama/nakama"]
    command:
      [
        "migrate",
        "up",
        "--database.address",
        "root@cockroachdb:26257/nakama?sslmode=disable",
      ]
    restart: on-failure

  nakama:
    image: heroiclabs/nakama:3.22.0
    expose:
      - "7350"
      - "7349"
      - "7351"
    depends_on:
      cockroachdb:
        condition: service_healthy
      backend-plugin:
        condition: service_started
      nakama-migrate:
        condition: service_completed_successfully
    volumes:
      - plugin_output:/nakama/data/modules
      - ../nakama/local.yml:/nakama/data/local.yml
    entrypoint: ["/nakama/nakama"]
    command: ["--config", "/nakama/data/local.yml"]
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
    depends_on:
      - nakama
    restart: unless-stopped

volumes:
  cockroach_data:
  plugin_output:
